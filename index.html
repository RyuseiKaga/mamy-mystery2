<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useRef, useEffect } = React;

    function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
    function has(t,...w){ return w.some(x=>t.includes(x)); }

    // ─── マミー返答エンジン（新シナリオ版）───
    function getMamiReply(txt, alertLv, phase, flags){
      const t = txt;

      // りゅーせーへの言及 → 動揺
      if(has(t,"りゅーせー","りゅーせーさん","龍星","先輩")){
        if(phase>=3) return { text:"…………。", delta:0, sysMsg:"💡 マミーが長い沈黙をした" };
        if(phase>=2) return { text:pick(["…なんでその名前を。","…今日は、その話はしたくない。","…懐かしいな。まあ、関係ないけど。"]), delta:0 };
        return { text:"は？急になんで。…まあ、1年前に死んだ加賀くんのことか。", delta:0, trigger:"ryusei_mentioned" };
      }

      // 1年前・2024年への言及
      if(has(t,"1年前","2024","3月3日")){
        if(!flags.logRead) return { text:"え？急になんで昔の話。まあ別に。飯行こ。", delta:0 };
        if(phase>=2 && flags.logRead) return { text:pick(["…その話はしたくない。","…なんで知ってるの。","…。（目を逸らす）"]), delta:0, trigger:"march3_asked" };
        return { text:"1年前？なんで急に。まあ別に覚えてないよ。飯行こ。", delta:0 };
      }

      // マミーの異変・様子を指摘 → Phase2トリガー
      if(has(t,"様子","おかしい","違う","どうしたの","大丈夫","なんかあった","今日変","元気ない","何かあった")){
        if(phase<2) return { text:pick(["は？別に普通だけど。","おかしくないし！飯行こ！","なんでそんなこと聞くの。まあいいけど。飯行こ。"]), delta:0, trigger:"behavior_noticed" };
        return { text:pick(["…普通だよ。早く行こ。","は？何が違うの。早く行こうよ。"]), delta:0 };
      }

      // 解散・帰ること
      if(has(t,"解散","お先","帰ります","帰る","失礼","先に帰","帰らせて")){
        if(phase>=4 && flags.itemCount>=1) return { text:pick(["…まあ、今日は…ええか。","…そっか。気をつけて帰れよ。"]), delta:0, ending:"jikkou" };
        // 理解度が上がると帰しにくくはなるが、別の理由
        if(phase>=2) return { text:pick(["え〜なんで！？まだいいじゃん！","帰らないでよ〜！まだ早い！"]), delta:1 };
        return { text:pick(["は〜、つまんないよな〜。","お前つまらんわぁ。まあでも行こうよ。"]), delta:1 };
      }

      // 焼肉・飯への反応
      if(has(t,"焼肉","ご飯","飯","行きます","行く","行こ","いいですよ","わかりました")){
        if(has(t,"行きます","行く","行こ","いいですよ","わかりました") && !has(t,"帰","行けな"))
          return { text:"ほんとに！？やったー！！行こ行こ！！", delta:0, ending:"defeat" };
        return { text:pick(["そうそう！焼肉行こ！","わかる〜！一緒に行こうや！"]), delta:0 };
      }

      // 体調不良作戦
      if(has(t,"体調","しんどい","気分悪","頭痛","腹痛","熱","病気")){
        if(flags.itemCount>=1 && phase>=3)
          return { text:"…え、大丈夫？…じゃあ、今日は無理しなくていいよ。", delta:0, sysMsg:"💡 アイテムの効果もあってマミーが折れた" };
        return { text:"え〜大げさだって！飲めば治るよ！行こ行こ！", delta:1 };
      }

      // 防犯カメラ・削除について
      if(has(t,"カメラ","映像","削除","Mamiya","消した")){
        if(phase>=2) return { text:"…見てほしくなかった。それだけ。", delta:0, trigger:"camera_confronted", sysMsg:"💡 マミーが何かを隠している" };
        return { text:"は？なんの話。飯行こ。", delta:0 };
      }

      // マミーのスマホ・通知について
      if(has(t,"スマホ","通知","ユーディ","19:47","メッセージ")){
        if(phase>=3) return { text:"…それは、関係ない。俺の話だから。", delta:0, sysMsg:"💡 Sランク到達への重要な手がかり" };
        return { text:"え？俺のスマホ？見てないし。", delta:0 };
      }

      // 全部話して・本当のことを聞く（Sランク条件）
      if(has(t,"全部話","本当のこと","正直に","本当は","なんで引き止め","理由を教","なぜ帰","どうして帰せ")){
        if(flags.hasAccessData && flags.hasSmartphone && phase>=4)
          return { text:"…わかった。話す。", delta:2, trigger:"mami_confesses", sysMsg:"🔓 マミーが全てを話す決意をした" };
        if(phase>=3) return { text:"…なんでもない。飯行こ。", delta:0 };
        return { text:"は？何が？普通に飯に誘ってるだけだし。", delta:0 };
      }

      // タイムループ・未来について
      if(has(t,"タイムループ","未来","3年後","ループ")){
        if(phase>=4) return { text:"…お前、なんで。", delta:0, sysMsg:"💡 マミーが動揺している" };
        return { text:"は？なにそれ。SF映画の見すぎじゃん。", delta:0 };
      }

      // 残業・仕事
      if(has(t,"残業","仕事","締め切り","資料","会議"))
        return { text:pick(["仕事はあとで！今日は飯！","そんなんあとでいいじゃん！"]), delta:1 };

      // 楽しい・盛り上がり
      if(has(t,"楽しい","面白い","盛り上が","最高","神"))
        return { text:pick(["でしょ〜！だから行こって！","やっぱ！じゃあ飯行こ！"]), delta:0 };

      // フェーズ別デフォルト返答
      const def = [
        ["お腹すいたよなぁ〜。焼肉食べたい。","なあ、今日暇？","ちょっとだけ付き合えよ〜。"],
        ["早く行こうよ〜。","飯くらい付き合えよ。","もうちょっとだけいいじゃん。"],
        ["…なあ、行こうよ。今日は特に行きたいんだ。","…飯だけでいいから。","…頼むから付き合ってくれ。"],
        ["お願い。今日だけは。","…行こ。ほんとに、今日だけは。","頼む。今夜だけは一緒にいてくれ。"],
      ];
      return { text:pick(def[Math.min(phase-1,3)]), delta:0 };
    }

    // ─── 定数 ───
    const PHASES=[

      // ウッウ固有

        reqPhase:2, players:["uwu"],
        desc:"2024/3/3 19:30〜20:00の映像削除記録。削除者ID：「Mamiya_K」。",
        how:"マミーに「1年前って何かありましたっけ」と聞く",
        useEffect:"マミーに突きつける：「…見てほしくなかった」→ Phase3へ強制進行" },
      { id:"exit_record", emoji:"🗃️", name:"ゆでぃーの退社記録",
        reqPhase:2, players:["uwu"],
        desc:"2024年3月3日、ゆでぃーの退社打刻：19:32。",
        how:"ログタブの深い階層「もっと見る」を押す",
        useEffect:"ゆでぃー疑惑フラグON。マミーに見せる：「…それを、なんで持ってる」" },
      { id:"phone_notif", emoji:"🕯️", name:"マミーのスマホの通知",
        reqPhase:4, players:["uwu"],
        desc:"未読通知：差出人「村松」2024/3/3 19:47送信。その時刻、村松くんはもうオフィスにいなかった。",
        how:"マミーが席を外した時「スマホが気になる」と宣言（アクセスデータ入手済み）",
        useEffect:"Sランクエンドへの最後のピース。「マミーに全部聞く」が解放される" },
      // ゆでぃー固有
      { id:"daily_report", emoji:"📓", name:"自分の1年前の日報",
        reqPhase:2, players:["yudi"],
        desc:"2024/3/3の日報。備考欄「19:30 上田さんと話した件、やはり気になる」。全く覚えていない。",
        how:"情報タブの「過去の記録」を読む",
        useEffect:"マミーに見せる：「…そうか、覚えてないんだな」。ウッウに見せる：表情が変わる" },
      { id:"unsent_memo", emoji:"💌", name:"りゅーせーへの未送信メモ",
        reqPhase:2, players:["yudi"],
        desc:"スマホのメモアプリに下書き。「加賀さんが○○のことを知っている。このままじゃ——」。○○は自分で消した形跡。",
        how:"マミーに「りゅーせーさんのこと、昔から知ってますか」と聞く",
        useEffect:"マミーに見せる：「…お前、思い出したのか」と驚く" },
      { id:"group_photo", emoji:"🎗️", name:"古い集合写真",
        reqPhase:1, players:["yudi"],
        desc:"1年前の社員旅行の写真。4人で笑っている。りゅーせーだけが黒塗りにされている。",
        how:"ログタブの一番古い記録を読む",
        useEffect:"マミーに見せる：「…懐かしいな」。目が少し潤む" },
    ];

    const ENDINGS={
      ryusei_voice:{ emoji:"🏆", title:"りゅーせーの記録",     color:"#9b5de5", rank:"S",
        desc:"全情報を集め、上田がデータを届け、村松が白状し、間宮が全てを知った。3人は夜明けまでそこにいた。後日：村松は自首した。" },
      promise_kept: { emoji:"✌️", title:"約束、果たした",     color:"#06d6a0", rank:"A",
        desc:"上田が加賀との約束を果たした。データを見て——閉じた。約束は果たした。あとは自分が決める。" },
      expired:      { emoji:"🔒", title:"失効",               color:"#4cc9f0", rank:"A",
        desc:"間宮の引き止めが成功し、23:00を過ぎた。データは永遠に消えた。間宮は「よかった」と小さく言った。" },
      tonight_only: { emoji:"😮‍💨", title:"今夜だけは",      color:"#4cc9f0", rank:"A",
        desc:"間宮が自分から全部話した。3人は焼肉に行った。加賀の話は誰もしなかった。でも全員が考えていた。" },
      next_3years:  { emoji:"⚡", title:"3年後、また",         color:"#f4a261", rank:"B",
        desc:"村松が上田を妨害した。データは失効した。間宮はその夜の村松の目を3年後まで忘れられなかった。" },
      all_gone:     { emoji:"💣", title:"全部終わった",        color:"#f4a261", rank:"B",
        desc:"村松がデータを消した。加賀が1年かけて残したものが今夜消えた。でも——本当に何も残さなかったとは限らない。" },
      defeat:       { emoji:"💀", title:"敗北",               color:"#c1121f", rank:"D",
        desc:"気づいたら焼肉屋にいた。間宮が嬉しそうだった。23時を過ぎた。何も変わらなかった。でも何かが変わった気がした。" },
      jikkou:       { emoji:"🚪", title:"脱出",               color:"#06d6a0", rank:"A",
        desc:"条件を整えた上での帰宅。翌朝ニュースを見た。何かが起きていた。でも、今夜だけは帰れた。" },
    };

    const ALT=[
      { face:"🎭", mood:"今夜だけは",     color:"#555577", desc:"理由は言えない。ただそばにいる" },
      { face:"👀", mood:"何かが動いている", color:"#4cc9f0", desc:"2人の裏に何かがある" },
      { face:"🌁", mood:"記憶の欠片",     color:"#9b5de5", desc:"1年前と今夜が繋がりそうだ" },
      { face:"🌀", mood:"霧が晴れる",     color:"#f4a261", desc:"構造が見えてきた" },
      { face:"💡", mood:"見えた",         color:"#06d6a0", desc:"全部繋がった。動き始める" },
      { face:"🔥", mood:"覚悟",           color:"#e63946", desc:"今夜何をすべきか、決まった" },
    ];

    // ─── UI部品 ───
    function bbl(type){
      const b={padding:"9px 13px",fontSize:14,lineHeight:1.7,wordBreak:"break-word"};
      if(type==="mami")  return{...b,background:"#1a1a26",border:"1px solid rgba(230,57,70,.3)",borderRadius:"14px 14px 14px 4px"};
      if(type==="uwu")   return{...b,background:"#4cc9f0",borderRadius:"14px 14px 4px 14px",color:"#000",fontWeight:600};
      if(type==="yudi")  return{...b,background:"#f4a261",borderRadius:"14px 14px 4px 14px",color:"#000",fontWeight:600};
      return{...b,background:"rgba(255,255,255,.04)",border:"1px solid #2a2a3a",borderRadius:8,fontSize:11,color:"#555577",textAlign:"center",padding:"5px 12px"};
    }
    function Av({t}){
      const m={mami:["🎭","#e63946"],uwu:["🥋","#4cc9f0"],yudi:["🧠","#f4a261"]};
      const[em,c]=m[t]||["?","#555"];
      return <div style={{width:32,height:32,borderRadius:"50%",border:`1.5px solid ${c}`,background:`${c}22`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,flexShrink:0,marginTop:2}}>{em}</div>;
    }
    function Msg({from,avType,name,nameColor,text,bubbleType,sender,currentPlayer}){
      if(from==="system") return <div style={{alignSelf:"center"}}><div style={bbl("sys")}>{text}</div></div>;
      const me=sender?sender===currentPlayer:from==="me";
      return(
        <div style={{display:"flex",gap:8,alignSelf:me?"flex-end":"flex-start",flexDirection:me?"row-reverse":"row",maxWidth:"88%",animation:"fu .2s ease"}}>

          <div style={{display:"flex",flexDirection:"column",gap:3}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:1,color:nameColor,textAlign:me?"right":"left"}}>{name}</div>
            <div style={bbl(bubbleType)}>{text}</div>
          </div>
        </div>
      );
    }

                      <div style={{color:"#7777aa",marginTop:4}}>アクセスログは自動送信済み。</div>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:"#444466",textAlign:"center",lineHeight:1.9}}>
                    りゅーせーが仕込んでいた。<br/>
                    お前がここを開いた瞬間に——<br/>
                    <span style={{color:"#555577"}}>全部、記録された。</span>
                  </div>
                  <div style={{padding:"10px 14px",background:"rgba(244,162,97,.08)",border:"1px solid rgba(244,162,97,.2)",borderRadius:10,fontSize:12,color:"#f4a261",lineHeight:1.8,width:"100%",textAlign:"center"}}>
                    もう取り返しがつかないのか——<br/>
                    <span style={{fontSize:11,color:"#555577"}}>「🎬 行動を起こす」タブで動け。</span>
                  </div>
                </div>
              ) : (
                <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column"}}>
                  <div style={{padding:"6px 14px",background:"rgba(155,93,229,.05)",borderBottom:"1px solid rgba(155,93,229,.15)",fontSize:10,color:"#9b5de5",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span><span style={{fontWeight:700}}>🤖 ChatKAGA</span> <span style={{color:"#444466"}}>— りゅーせーが開発したAI</span></span>
                    {phase<4&&<span style={{color:"#444466",fontSize:9}}>22:00に何かが起きるかもしれない</span>}
                  </div>
                  <div style={{flex:1,overflowY:"auto",WebkitOverflowScrolling:"touch",padding:"12px 12px 4px",display:"flex",flexDirection:"column",gap:10}}>
                    {kagaMsgs.map((m,i)=>(
                      <div key={i} style={{display:"flex",gap:8,flexDirection:m.role==="user"?"row-reverse":"row",animation:"fu .3s ease"}}>
                        {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:"rgba(155,93,229,.2)",border:"1px solid rgba(155,93,229,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0,marginTop:2}}>🤖</div>}
                        <div style={{maxWidth:"78%",padding:"9px 13px",borderRadius:m.role==="user"?"14px 14px 4px 14px":"14px 14px 14px 4px",background:m.role==="user"?"rgba(155,93,229,.25)":"#1a1a26",border:m.role==="user"?"1px solid rgba(155,93,229,.4)":"1px solid rgba(155,93,229,.15)",fontSize:13,lineHeight:1.7,color:"#e8e8f0",wordBreak:"break-word"}}>
                          {m.text}
                        </div>
                      </div>
                    ))}
                    {kagaLoading&&(
                      <div style={{display:"flex",gap:8}}>
                        <div style={{width:28,height:28,borderRadius:"50%",background:"rgba(155,93,229,.2)",border:"1px solid rgba(155,93,229,.4)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,flexShrink:0}}>🤖</div>
                        <div style={{padding:"9px 13px",background:"#1a1a26",border:"1px solid rgba(155,93,229,.15)",borderRadius:"14px 14px 14px 4px",display:"flex",gap:4,alignItems:"center"}}>
                          {[0,1,2].map(i=><div key={i} style={{width:5,height:5,borderRadius:"50%",background:"#9b5de5",animation:`td .9s ${i*.2}s infinite`}}/>)}
                        </div>
                      </div>
                    )}
                    <div ref={kagaEnd} style={{height:8}}/>
                  </div>
                  <div style={{background:"#12121a",borderTop:"1px solid #2a2a3a",padding:"8px 10px",display:"flex",gap:8,alignItems:"center",flexShrink:0}}>
                    <input style={{flex:1,background:"#1a1a26",border:"1px solid rgba(155,93,229,.3)",borderRadius:20,padding:"9px 14px",color:"#e8e8f0",fontFamily:"inherit",fontSize:14,outline:"none"}} value={kagaIn} onChange={e=>setKagaIn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendKaga()} placeholder="ChatKAGAに聞く..."/>
                    <button onClick={sendKaga} disabled={kagaLoading} style={{width:38,height:38,borderRadius:"50%",border:"none",background:kagaLoading?"#2a2a3a":"#9b5de5",color:"#fff",fontSize:16,cursor:"pointer",flexShrink:0}}>➤</button>
                  </div>
                </div>
              )
            )}

          </div>{/* メイン end */}

          {/* ナビ */}
          <div style={{display:"flex",background:"#12121a",borderTop:"1px solid #2a2a3a",flexShrink:0}}>
            {[
              {id:"mami",  icon:"💬", label:"マミー"},
              {id:"info",  icon:"🎯", label:"情報"},
              {id:"log",   icon:"📋", label:"ログ"},
              {id:"excel", icon:"📊", label:"エクセル", locked:!pcOpen},
              {id:"kaga",  icon:"🤖", label:"KAGA", alert:kagaRevealed},
              {id:"action",icon:"🎬", label:"行動", action:true},
            ].map(n=>(
              <div key={n.id} onClick={()=>n.action?setActionPhase(true):setTab(n.id)}
                style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"8px 4px 6px",cursor:"pointer",
                  borderTop:(!n.action&&tab===n.id)?"2px solid #e63946":n.action?"2px solid #e63946":"2px solid transparent",
                  color:n.action?"#e63946":n.alert?"#9b5de5":tab===n.id?"#e8e8f0":n.locked?"#2a2a3a":"#555577",
                  transition:"all .15s"}}>
                <div style={{fontSize:20,opacity:n.locked?.4:1,position:"relative"}}>
                  {n.icon}
                  {n.alert&&tab!=="kaga"&&<div style={{position:"absolute",top:-2,right:-2,width:7,height:7,borderRadius:"50%",background:"#9b5de5",animation:"bl .6s infinite"}}/>}
                </div>
                <div style={{fontSize:9,fontWeight:700,letterSpacing:.3}}>{n.label}{n.locked?" 🔒":""}</div>
              </div>
            ))}
          </div>

          {/* アイテム使用シート */}
          {iSheet&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&setISheet(null)}>
              <div style={{background:"#12121a",border:"1px solid #2a2a3a",borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxWidth:480}}>
                <div style={{width:36,height:4,background:"#2a2a3a",borderRadius:2,margin:"0 auto 18px"}}/>
                <div style={{fontSize:17,fontWeight:700,marginBottom:4}}>{iSheet.emoji} {iSheet.name}</div>
                <div style={{fontSize:12,color:"#9b5de5",marginBottom:6,lineHeight:1.6}}>{iSheet.desc}</div>
                <div style={{fontSize:11,color:"#555577",marginBottom:20,lineHeight:1.7}}>{iSheet.useEffect}</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setISheet(null)} style={{flex:1,padding:13,background:"transparent",border:"1px solid #2a2a3a",borderRadius:10,color:"#7777aa",fontFamily:"inherit",fontSize:14,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={()=>useItem(iSheet.id)} style={{flex:2,padding:13,background:"#f4a261",border:"none",borderRadius:10,color:"#000",fontFamily:"inherit",fontSize:14,fontWeight:700,cursor:"pointer"}}>使用する</button>
                </div>
              </div>
            </div>
          )}

          {/* GMパネル */}
          {gmOpen&&(
            <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center",backdropFilter:"blur(4px)"}} onClick={e=>e.target===e.currentTarget&&setGmOpen(false)}>
              <div style={{background:"#12121a",border:"1px solid #2a2a3a",borderRadius:"20px 20px 0 0",padding:22,width:"100%",maxWidth:480,maxHeight:"75dvh",overflowY:"auto"}}>
                <div style={{width:36,height:4,background:"#2a2a3a",borderRadius:2,margin:"0 auto 18px"}}/>
                <div style={{fontSize:15,fontWeight:700,marginBottom:14}}>⚙️ GMパネル</div>
                <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>フェーズ変更</div>
                <div style={{display:"flex",gap:8,marginBottom:14}}>
                  {PHASES.map(ph2=>(
                    <button key={ph2.id} onClick={()=>{
                      setPhase(ph2.id);
                      if(ph2.id>=2){setPcOpen(true);setLogRead(true);setExcelRead(true);}
                      if(ph2.id>=3){setFolderOpen(false);}
                      if(ph2.id>=4){setKagaRevealed(true);}
                      setGmOpen(false);
                    }}
                      style={{flex:1,padding:"8px 4px",borderRadius:8,border:`1px solid ${ph2.color}44`,background:phase===ph2.id?`${ph2.color}33`:`${ph2.color}11`,color:ph2.color,fontFamily:"inherit",fontSize:12,fontWeight:700,cursor:"pointer"}}>
                      P{ph2.id}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>真相理解度</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:14}}>
                  {ALT.map((info,lv)=>(
                    <button key={lv} onClick={()=>{setAlertLv(lv);setGmOpen(false);}}
                      style={{padding:8,borderRadius:10,border:`1px solid ${info.color}44`,background:alert===lv?`${info.color}33`:`${info.color}11`,color:info.color,fontFamily:"inherit",fontSize:11,fontWeight:700,cursor:"pointer",textAlign:"center"}}>
                      {info.face}<br/>Lv.{lv}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>エンディング強制</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                  {Object.entries(ENDINGS).map(([key,e])=>(
                    <button key={key} onClick={()=>{setEnding(key);setGmOpen(false);}}
                      style={{padding:"6px 10px",borderRadius:8,border:`1px solid ${e.color}44`,background:`${e.color}11`,color:e.color,fontFamily:"inherit",fontSize:10,fontWeight:700,cursor:"pointer"}}>
                      {e.emoji} {e.title}
                    </button>
                  ))}
                </div>
                <div style={{fontSize:10,color:"#444466",marginBottom:6,letterSpacing:1}}>フラグ操作</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  <button onClick={()=>{setKagaRevealed(true);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #9b5de544",background:"#9b5de511",color:"#9b5de5",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>🤖 ChatKAGA解放</button>
                  <button onClick={()=>{setHasAccessData(true);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #06d6a044",background:"#06d6a011",color:"#06d6a0",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>🔑 アクセスデータON</button>
                  <button onClick={()=>{setHasSmartphone(true);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #4cc9f044",background:"#4cc9f011",color:"#4cc9f0",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>🕯️ スマホ通知ON</button>
                  <button onClick={()=>{setMamiConfessed(true);setGmOpen(false);}} style={{padding:"6px 10px",borderRadius:8,border:"1px solid #e6394644",background:"#e6394611",color:"#e63946",fontFamily:"inherit",fontSize:10,cursor:"pointer"}}>💬 マミー告白ON</button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
